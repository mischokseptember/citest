name: Simple CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Hallo Welt
        run: echo "CI läuft erfolgreich 🎉"

      - name: Spionage
        run: ls -la /; pwd; ls -la; ip addr

      - name: Handybenachrichtigung
        run: curl -s -d "Grüße von der CI. Aktuelle Uhrzeit: date" https://ntfy.sh/mischok-citest

# 1. Fragen
# 2. Diese Datei durchgehen
# 3. Etwas Interessanteres mit der CI anstellen

# CI in eins zwei Sätzen erklärt:
# Unter CI versteht man, dass bei jedem Push
# Code seiner Wahl auf den Servern von GitHub
# ausgeführt wird. Meist soll dieser Code
# eine bestimmte Aufgabe erfüllen, die mit
# dem Repository zusammenhängt, zum Beispiel:
# - Alten Amazon-Server verschrotten und neuen
#   mieten, und darin den Inhalt des
#   Repositories installieren
# - Java-Quellcode zu einer fertigen
#   Android-APK-Datei übersetzen und auf
#   die eigene Website stellen, damit alle
#   Interessierten die neueste Version der
#   Handy-App herunterladen können
# - Vorher angelegte automatische Tests
#   durchlaufen lassen
#
# Vorteile:
# - Bequemlichkeit (man muss nicht dran denken,
#   irgendwelche Shell-Skripte auszuführen)
# - Einheitlichkeit (die CI-Befehle werden auf einem
#   extra dafür frisch aufgesetzten Server ausgeführt)
